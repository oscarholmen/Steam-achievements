version: "3.9"
 
services:
 
  # ─────────────────────────────────────────
  # Database
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: steam_achievements
    volumes:
      - pgdata:/var/lib/postgresql/data   # Data overlever restart
    ports:
      - "5433:5432"                       # Tilgjengelig lokalt for pgAdmin
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
 
  # ─────────────────────────────────────────
  # Poller – henter fra Steam og sender webhooks
  # ─────────────────────────────────────────
  poller:
    build: ./services/poller
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@postgres:5432/steam_achievements
    depends_on:
      postgres:
        condition: service_healthy   # Venter til Postgres er klar
    restart: unless-stopped
 
  # ─────────────────────────────────────────
  # API – webhook-registrering
